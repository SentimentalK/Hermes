model:
  provider: openrouter
  default: anthropic/claude-sonnet-4.6
  base_url: https://openrouter.ai/api/v1

provider_routing:
  # Keep requests on Anthropic via OpenRouter BYOK. In OpenRouter, set the
  # Anthropic BYOK integration to "Always use this key" to prevent shared-credit fallback.
  only:
    - anthropic
  order:
    - anthropic
  ignore: []
  require_parameters: false
  data_collection: deny

terminal:
  backend: local
  cwd: /opt/data
  timeout: 180
  env_passthrough: []

browser:
  inactivity_timeout: 120

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
  group_sessions_per_user: true

skills:
  creation_nudge_interval: 15

display:
  compact: false
  tool_progress: all
  interim_assistant_messages: true
  busy_input_mode: interrupt

agent:
  max_turns: 90
  reasoning_effort: medium
